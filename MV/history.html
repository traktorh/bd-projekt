<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia czytania - MANGAVERSE</title>
    <link rel="stylesheet" href="themes.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="manga-card-menu.css">
    
    <style>
        /* Улучшения только для области манг */
        .manga-item {
            display: flex;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #444;
            transition: all 0.3s ease;
        }
        
        .manga-item:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .manga-item:last-child {
            border-bottom: none;
        }
        
        .manga-cover {
            width: 80px;
            height: 110px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        
        .manga-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .manga-item:hover .manga-cover img {
            transform: scale(1.1);
        }
        
        .manga-info {
            flex: 1;
        }
        
        .manga-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .manga-meta {
            font-size: 16px;
            color: #999;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            height: 8px;
            background: #444;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .manga-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }
        
        .btn-secondary {
            background: #444;
            color: #fff;
            border: 1px solid #555;
        }
        
        .btn-secondary:hover {
            background: #555;
            border-color: #666;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: #fff;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.3);
        }

        /* Улучшения для статистики */
        .stats-section {
            background: linear-gradient(145deg, #2d3436 0%, #1e1e1e 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #444;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .stats-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #fff;
            text-align: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .stat-item {
            background: linear-gradient(145deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #444;
            transition: all 0.3s ease;
        }
        
        .stat-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.4);
            border-color: #667eea;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            display: block;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
        }
        
        .stat-label {
            font-size: 16px;
            color: #999;
        }

        /* Анимации для уведомлений */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* Кнопка закладок */
        .btn-bookmark {
            background: linear-gradient(135deg, #ffc107, #ff9800);
            color: #fff;
        }

        .btn-bookmark:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 193, 7, 0.4);
        }

        .btn-bookmarked {
            background: linear-gradient(135deg, #28a745, #20c997);
        }

        .btn-bookmarked:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="left-side">
            <a class="logo" href="index.html">MANGA<span>VERSE</span></a>
            <div class="search-box">
                <input id="searchInput" type="text" placeholder="Szukaj mangi...">
            </div>
        </div>
        
        <div class="center-nav">
        </div>
        
        <div class="right-side">
            <a href="index.html" class="nav-link">Strona główna</a>
            <a href="catalog.html" class="nav-link">Katalog</a>
            <a href="novinki.html" class="nav-link">Nowości</a>
            <div class="account-menu">
                <button onclick="toggleMenu()" class="account-btn">Konto ▼</button>
                <div id="myDropdown" class="dropdown-content">
                    <a href="javascript:void(0)" class="dropdown-item" onclick="openAuthModal('register'); return false;">Rejestracja</a>
                    <a href="javascript:void(0)" class="dropdown-item" onclick="openAuthModal('login'); return false;">Logowanie</a>
                    <div class="divider"></div>
                    <a href="history.html" class="dropdown-item">📚 Historia czytania</a>
                </div>
            </div>
        </div>
    </header>

    <main class="content">
        <div class="history-header">
            <h1 class="history-title">📚 Historia czytania</h1>
            <p class="history-subtitle">Twoja biblioteka przeczytanej mangi</p>
        </div>

        <div id="content">
            <!-- Контент будет загружен здесь -->
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function getReadingHistory() {
            const history = localStorage.getItem('mangaReadingHistory');
            return history ? JSON.parse(history) : {};
        }

        function getMangaData(mangaId) {
            const mangaData = {
                'angel-next-door': {
                    title: 'Angel Next Door',
                    cover: 'https://pic.readkakegurui.com/file/sancdn/the-angel-next-door-spoils-me-rotten-after-the-rain/chapter-1/1.webp',
                    chapters: 39
                },
                'chainsaw-man': {
                    title: 'Chainsaw Man',
                    cover: 'https://cdn.tsnocheck.ru/static/99fca753-b234-482c-89c4-3d878cadeb2e.avif',
                    chapters: 110
                },
                'spy-x-family': {
                    title: 'Spy x Family',
                    cover: 'https://www.mangaread.org/wp-content/uploads/2020/05/77.jpg',
                    chapters: 86
                },
                'high-school-dxd': {
                    title: 'High School DxD',
                    cover: 'https://starshaya-shkola-animego.ru/storage/app/uploads/public/674/33c/3ed/67433c3ed912653258254.webp',
                    chapters: 25
                }
            };
            
            return mangaData[mangaId] || {
                title: 'Unknown Manga',
                cover: 'https://via.placeholder.com/80x110.png?text=No+Image',
                chapters: 39
            };
        }

        function deleteMangaFromHistory(mangaId) {
            if (confirm(`Вы уверены, что хотите удалить историю чтения для ${getMangaData(mangaId).title}?`)) {
                const history = getReadingHistory();
                const mangaKey = `manga_${mangaId}`;
                
                if (history[mangaKey]) {
                    delete history[mangaKey];
                    localStorage.setItem('mangaReadingHistory', JSON.stringify(history));
                    
                    // Перезагружаем страницу
                    loadHistory();
                }
            }
        }

        function getBookmarks() {
            const bookmarks = localStorage.getItem('mangaBookmarks');
            return bookmarks ? JSON.parse(bookmarks) : [];
        }

        function saveBookmark(mangaId) {
            const bookmarks = getBookmarks();
            const mangaData = getMangaData(mangaId);
            
            // Проверяем, есть ли уже такая закладка
            if (bookmarks.includes(mangaId)) {
                showNotification(`${mangaData.title} уже в закладках`, 'info');
                return;
            }
            
            bookmarks.push(mangaId);
            localStorage.setItem('mangaBookmarks', JSON.stringify(bookmarks));
            showNotification(`${mangaData.title} добавлена в закладки`, 'success');
            loadHistory(); // Обновляем страницу для показа закладок
        }

        function removeBookmark(mangaId) {
            const bookmarks = getBookmarks();
            const mangaData = getMangaData(mangaId);
            
            const index = bookmarks.indexOf(mangaId);
            if (index > -1) {
                bookmarks.splice(index, 1);
                localStorage.setItem('mangaBookmarks', JSON.stringify(bookmarks));
                showNotification(`${mangaData.title} удалена из закладок`, 'success');
                loadHistory(); // Обновляем страницу
            }
        }

        function isBookmarked(mangaId) {
            const bookmarks = getBookmarks();
            return bookmarks.includes(mangaId);
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 8px;
                color: white;
                font-weight: 600;
                z-index: 1000;
                animation: slideIn 0.3s ease;
                box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            `;
            
            switch(type) {
                case 'success':
                    notification.style.background = 'linear-gradient(135deg, #28a745, #20c997)';
                    break;
                case 'error':
                    notification.style.background = 'linear-gradient(135deg, #dc3545, #c82333)';
                    break;
                default:
                    notification.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
            }
            
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => document.body.removeChild(notification), 300);
            }, 3000);
        }

        function loadHistory() {
            const history = getReadingHistory();
            const content = document.getElementById('content');
            
            if (Object.keys(history).length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📚</div>
                        <div class="empty-title">История пуста</div>
                        <div class="empty-text">Начните читать манги, чтобы увидеть вашу библиотеку здесь</div>
                        <a href="catalog.html" class="back-link">Перейти в каталог</a>
                    </div>
                `;
                return;
            }

            let html = '<div class="main-layout">';
            
            // Расчет статистики
            let totalManga = 0;
            let totalChapters = 0;
            let completedCount = 0;
            
            for (const [mangaKey, chapters] of Object.entries(history)) {
                totalManga++;
                totalChapters += chapters.length;
                if (chapters.length >= 39) {
                    completedCount++;
                }
            }
            
            // Левая боковая панель - манга
            html += '<div class="manga-sidebar">';
            html += '<div class="read-manga-section">';
            html += '<h2 class="read-manga-title">📖 Прочитанная манга</h2>';
            html += '<div class="manga-list">';
            
            // Список прочитанной манги
            for (const [mangaKey, chapters] of Object.entries(history)) {
                const mangaId = mangaKey.replace('manga_', '');
                const lastChapter = Math.max(...chapters);
                const progress = Math.round((chapters.length / 39) * 100);
                
                // Получаем данные о манге
                const mangaData = getMangaData(mangaId);
                
                html += `
                    <div class="manga-item">
                        <div class="manga-cover">
                            <img src="${mangaData.cover}" alt="${mangaData.title}">
                        </div>
                        <div class="manga-info">
                            <div class="manga-title">${mangaData.title}</div>
                            <div class="manga-meta">${chapters.length} z ${mangaData.chapters} rozdziałów • ${progress}%</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                            <div class="manga-actions">
                                <a href="${mangaId === 'high-school-dxd' ? 'reader-high-school-dxd.html' : mangaId === 'chainsaw-man' ? 'reader-chainsaw-man.html' : 'reader.html'}?manga=${mangaId}&chapter=${lastChapter}" class="btn btn-primary">Czytaj dalej</a>
                                <a href="manga-detail-modern.html?id=${mangaId}" class="btn btn-secondary">Szczegóły</a>
                                <button onclick="saveBookmark('${mangaId}')" class="btn ${bookmarked ? 'btn-bookmarked' : 'btn-bookmark'}">
                                    ${bookmarked ? '✓ В закладках' : '⭐ Do zakładek'}
                                </button>
                                <button onclick="deleteMangaFromHistory('${mangaId}')" class="btn btn-danger" style="background: #dc3545;">Usuń historię</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            html += '</div></div></div>';
            
            // Основной контент по центру
            html += '<div class="main-content">';
            
            // Секция с закладками
            const bookmarks = getBookmarks();
            if (bookmarks.length > 0) {
                html += '<div class="read-manga-section" style="margin-top: 30px;">';
                html += '<h2 class="read-manga-title">⭐ Закладки</h2>';
                html += '<div class="manga-list">';
                
                bookmarks.forEach(mangaId => {
                    const mangaData = getMangaData(mangaId);
                    html += `
                        <div class="manga-item">
                            <div class="manga-cover">
                                <img src="${mangaData.cover}" alt="${mangaData.title}">
                            </div>
                            <div class="manga-info">
                                <div class="manga-title">${mangaData.title}</div>
                                <div class="manga-meta">${mangaData.chapters} rozdziałów</div>
                                <div class="manga-actions">
                                    <a href="manga-detail-modern.html?id=${mangaId}" class="btn btn-primary">Szczegóły</a>
                                    <button onclick="removeBookmark('${mangaId}')" class="btn btn-danger">Usuń z zakładek</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div></div>';
            }
            
            html += '</div>';
            
            // Правая боковая панель - статистика
            html += '<div class="stats-sidebar">';
            
            html += `
                <div class="stats-section">
                    <h2 class="stats-title">📊 Статистика</h2>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-number">${totalManga}</div>
                            <div class="stat-label">Всего манги</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${completedCount}</div>
                            <div class="stat-label">Завершено</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${totalChapters}</div>
                            <div class="stat-label">Прочитано глав</div>
                        </div>
                    </div>
                </div>
            </div>
            </div>`;
            
            content.innerHTML = html;
        }

        // Загружаем историю при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
