<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse — Чтение</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="reader.css">
</head>
<body>
    <header class="reader-header">
        <div class="reader-nav">
            <div class="reader-nav-left">
                <a href="index.html" class="logo">MV</a>
                <span class="manga-title-reader">Ангел по соседству</span>
            </div>
            <div class="reader-nav-center">
                <button class="chapter-nav-btn" onclick="previousChapter()">←</button>
                <span class="chapter-info">том 1 глава 1</span>
                <button class="chapter-nav-btn" onclick="nextChapter()">→</button>
            </div>
        </div>
    </header>

    <main class="reader-main">
        <div class="reader-content" id="chaptersList">
            <p style="text-align: center; margin-top: 100px;">Загрузка глав...</p>
        </div>
        
        <div class="reader-content" id="pagesContainer" style="display: none;">
            <div class="pages-header">
                <button class="back-to-chapters-btn" onclick="backToChapters()">← К главам</button>
                <div class="page-info">
                    <span id="currentPage">1</span> / <span id="totalPages">1</span>
                </div>
            </div>
            
            <div class="page-navigation">
                <button class="page-nav-btn" id="prevPageBtn" onclick="previousPage()" disabled>←</button>
                <button class="page-nav-btn" id="nextPageBtn" onclick="nextPage()">→</button>
            </div>
            
            <div class="page-display" id="pageDisplay">
                <p style="text-align: center; margin-top: 100px;">Загрузка страниц...</p>
            </div>
        </div>
    </main>

   

    <script>
        let currentChapter = 1;
        let totalChapters = 60;
        let mangaId = null;
        let currentPage = 1;
        let totalPages = 0;
        let pages = [];

        async function loadChapters() {
            const urlParams = new URLSearchParams(window.location.search);
            mangaId = urlParams.get('manga_id') || 1;
            
            try {
                const response = await fetch(`get_chapters.php?id=${mangaId}`);
                const data = await response.json();
                
                const chaptersList = document.getElementById('chaptersList');
                chaptersList.innerHTML = '';
               // Проверяем именно массив внутри объекта
              if (data.chapters && data.chapters.length > 0) {
                  data.chapters.forEach(chapter => {
                        const chapterDiv = document.createElement('div');
                        chapterDiv.className = 'chapter-item';
                        chapterDiv.innerHTML = `
                            <div class="chapter-header">
                                <span class="chapter-number">Глава ${chapter.chapter_number}</span>
                                <span class="chapter-title">${chapter.chapter_name || 'Глава ' + chapter.chapter_number}</span>
                                <span class="chapter-count">${chapter.page_count || 0} страниц</span>
                            </div>
                            <button class="read-chapter-btn" onclick="readChapter(${chapter.chapter_number})">Читать</button>
                        `;
                        chaptersList.appendChild(chapterDiv);
                    });
                } else {
                    chaptersList.innerHTML = '<p style="color: white; text-align: center; margin-top: 50px;">Главы не найдены</p>';
                }
            } catch (err) {
                console.error("Ошибка загрузки глав:", err);
            }
        }

        function previousChapter() {
            if (currentChapter > 1) {
                currentChapter--;
                loadChapters();
            }
        }

        function nextChapter() {
            if (currentChapter < totalChapters) {
                currentChapter++;
                loadChapters();
            }
        }

        function readChapter(chapterNum) {
            if (mangaId) {
                currentChapter = chapterNum;
                loadPages(chapterNum);
            }
        }
        
        async function loadPages(chapterNum) {
            try {
                const response = await fetch(`get_pages.php?manga_id=${mangaId}&chapter=${chapterNum}`);
                const data = await response.json();
                
                console.log('Response data:', data); // Debug logging
                
                if (data.success) {
                    pages = data.pages;
                    totalPages = data.total_pages;
                    currentPage = 1;
                    
                    console.log('Pages loaded:', pages.length, 'Total pages:', totalPages); // Debug logging
                    
                    document.getElementById('totalPages').textContent = totalPages;
                    document.getElementById('currentPage').textContent = currentPage;
                    
                    displayCurrentPage();
                    
                    // Show pages container, hide chapters
                    document.getElementById('chaptersList').style.display = 'none';
                    document.getElementById('pagesContainer').style.display = 'block';
                    
                    // Update navigation buttons
                    updatePageNavigation();
                } else {
                    console.error('Server error:', data.error);
                    alert('Ошибка загрузки страниц: ' + (data.error || 'Неизвестная ошибка'));
                }
            } catch (err) {
                console.error("Ошибка загрузки страниц:", err);
                alert('Ошибка соединения с сервером');
            }
        }
        
        function displayCurrentPage() {
            const pageDisplay = document.getElementById('pageDisplay');
            
            console.log('Displaying page:', currentPage, 'Total pages:', totalPages, 'Pages array length:', pages.length); // Debug logging
            
            if (pages.length === 0) {
                console.log('No pages found'); // Debug logging
                pageDisplay.innerHTML = '<p style="text-align: center; margin-top: 100px;">Страницы не найдены</p>';
                return;
            }
            
            const page = pages[currentPage - 1];
            console.log('Current page data:', page); // Debug logging
            
            const pageImage = document.createElement('img');
            pageImage.src = page.file_path;
            pageImage.alt = `Страница ${currentPage}`;
            pageImage.className = 'manga-page';
            
            // Add error handling for image loading
            pageImage.onerror = function() {
                console.error('Failed to load image:', page.file_path);
                pageDisplay.innerHTML = `<p style="text-align: center; margin-top: 100px;">Ошибка загрузки изображения: ${page.file_path}</p>`;
            };
            
            pageImage.onload = function() {
                console.log('Image loaded successfully:', page.file_path);
            };
            
            pageDisplay.innerHTML = '';
            pageDisplay.appendChild(pageImage);
            
            // Add page number indicator
            const pageNumber = document.createElement('div');
            pageNumber.className = 'page-number-indicator';
            pageNumber.textContent = `Страница ${currentPage} из ${totalPages}`;
            pageDisplay.appendChild(pageNumber);
        }
        
        function updatePageNavigation() {
            document.getElementById('prevPageBtn').disabled = currentPage <= 1;
            document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
            document.getElementById('currentPage').textContent = currentPage;
        }
        
        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                displayCurrentPage();
                updatePageNavigation();
            }
        }
        
        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                displayCurrentPage();
                updatePageNavigation();
            }
        }
        
        function backToChapters() {
            document.getElementById('pagesContainer').style.display = 'none';
            document.getElementById('chaptersList').style.display = 'block';
        }
        
        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('pagesContainer').style.display === 'block') {
                if (e.key === 'ArrowLeft') {
                    previousPage();
                } else if (e.key === 'ArrowRight') {
                    nextPage();
                } else if (e.key === 'Escape') {
                    backToChapters();
                }
            }
        });

        function closeNotification() {
            document.getElementById('notificationPanel').style.display = 'none';
        }

        // Загрузка глав при открытии страницы
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            mangaId = urlParams.get('manga_id') || 1;
            const chapterParam = urlParams.get('chapter');
            
            if (chapterParam) {
                // If chapter is specified in URL, load that chapter directly
                loadChapters().then(() => {
                    setTimeout(() => {
                        loadPages(parseInt(chapterParam));
                    }, 500);
                });
            } else {
                // Otherwise show chapters list
                loadChapters();
            }
            
            setTimeout(() => {
                document.getElementById('notificationPanel').style.display = 'block';
            }, 1000);
        };
    </script>
</body>
</html>
